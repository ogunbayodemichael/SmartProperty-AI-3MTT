<!DOCTYPE html>
<html>
<head>
    <title>SmartProperty AI</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }
        button {
            background: orange;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>SmartProperty AI</h1>
<p>AI-powered Property Price Prediction</p>

<div class="box">
    <p><b>Location:</b> Lagos</p>
    <p><b>Property Type:</b> 3-Bedroom Apartment</p>
    <p><b>Size:</b> 120 sqm</p>

    <button onclick="predict()">Predict</button>

    <h3 id="result"></h3>
</div>

<script>
function predict() {
    document.getElementById("result").innerHTML =
    "Estimated Price: ₦45,000,000 <br> ROI: 18% <br> Risk: Low";
}
</script>

</body>
</html>
